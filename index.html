<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Путешествуем с математикой</title>
   
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='%231e3799'/><circle cx='35' cy='35' r='20' fill='%233498db'/><circle cx='65' cy='65' r='20' fill='%232ecc71'/><path d='M35,35 L65,65' stroke='white' stroke-width='4' stroke-linecap='round'/><text x='50' y='85' font-family='Arial' font-size='12' fill='white' text-anchor='middle'>M+T</text></svg>">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='%231e3799'/><circle cx='35' cy='35' r='20' fill='%233498db'/><circle cx='65' cy='65' r='20' fill='%232ecc71'/><path d='M35,35 L65,65' stroke='white' stroke-width='4' stroke-linecap='round'/><text x='50' y='85' font-family='Arial' font-size='12' fill='white' text-anchor='middle'>M+T</text></svg>">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
   
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        html, body {
            overflow-x: hidden;
            -webkit-overflow-scrolling: touch;
        }

        body {
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            background-color: #0a0a14;
        }

        /* ФОН */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url('https://s6.iimage.su/s/05/uchDxJqx3uiQRpiwtnoRWz8kdCBUcokM6Nl7q0FF.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            z-index: -2;
            opacity: 0.88;
        }

        @media (max-width: 1024px) {
            body::before {
                position: absolute;
            }
        }

        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background: linear-gradient(rgba(10, 15, 30, 0.72), rgba(10, 15, 30, 0.52));
            z-index: -1;
            pointer-events: none;
        }

        /* ЗАГОЛОВОК С АНИМАЦИЕЙ */
        .site-title {
            font-size: clamp(2.2rem, 5vw, 3.5rem);
            font-weight: 900;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: white;
            text-align: center;
            margin-bottom: clamp(30px, 5vw, 60px);
            text-shadow:
                0 0 20px rgba(52, 152, 219, 0.7),
                0 0 40px rgba(52, 152, 219, 0.5),
                2px 2px 6px rgba(0, 0, 0, 0.8);
            position: relative;
            padding-bottom: 20px;
            animation: titleGlow 3s ease-in-out infinite alternate;
        }

        @keyframes titleGlow {
            0% {
                text-shadow:
                    0 0 20px rgba(52, 152, 219, 0.7),
                    0 0 40px rgba(52, 152, 219, 0.5),
                    2px 2px 6px rgba(0, 0, 0, 0.8);
                transform: translateY(0);
            }
            100% {
                text-shadow:
                    0 0 35px rgba(52, 152, 219, 0.95),
                    0 0 70px rgba(52, 152, 219, 0.7),
                    3px 3px 8px rgba(0, 0, 0, 0.9);
                transform: translateY(-6px);
            }
        }

        .site-title::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: min(80vw, 300px);
            height: 4px;
            background: linear-gradient(90deg, transparent, #3498db, #2ecc71, transparent);
            border-radius: 2px;
            filter: blur(1px);
            animation: linePulse 2.5s ease-in-out infinite alternate;
        }

        @keyframes linePulse {
            0% { width: min(60vw, 200px); opacity: 0.6; }
            100% { width: min(80vw, 300px); opacity: 1; }
        }

        /* КОНТЕЙНЕР ТРЕКОВ */
        .tracks-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: clamp(25px, 4vw, 40px);
            max-width: min(1400px, 95vw);
            width: 100%;
            margin: 0 auto;
            margin-bottom: clamp(40px, 6vw, 60px);
        }

        /* КАРТОЧКА */
        .track {
            background: rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            padding: clamp(20px, 3vw, 25px);
            display: flex;
            flex-direction: column;
            align-items: center;
            border: 1px solid rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(8px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35),
                        inset 0 1px 0 rgba(255, 255, 255, 0.1);
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1),
                        box-shadow 0.4s ease;
            contain: layout style paint;
            height: 100%;
            min-height: 520px;
        }

        @media (max-width: 768px) {
            .track {
                backdrop-filter: blur(5px);
                min-height: auto;
            }
        }

        .track:hover {
            transform: translateY(-12px) scale(1.025);
            box-shadow: 0 22px 50px rgba(0, 0, 0, 0.5),
                        0 0 25px rgba(52, 152, 219, 0.25);
        }

        .track-image {
            width: 100%;
            height: clamp(240px, 40vw, 320px);
            margin-bottom: clamp(15px, 3vw, 25px);
            overflow: hidden;
            border-radius: 12px;
        }

        .track-image img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            transition: transform 0.55s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .track:hover .track-image img {
            transform: scale(1.06);
        }

        .track-name {
            font-size: clamp(1.4rem, 3vw, 1.8rem);
            font-weight: 700;
            text-align: center;
            margin-bottom: clamp(15px, 3vw, 25px);
            line-height: 1.3;
        }

        /* === КНОПКИ С УЛУЧШЕННЫМ ОТСТУПОМ ОТ ИКОНКИ === */
        .track-buttons {
            display: flex;
            flex-direction: column;
            gap: clamp(12px, 2vw, 15px);
            width: 100%;
            margin-top: auto;
        }

        .btn {
            padding: clamp(14px, 2vw, 16px) clamp(20px, 2.5vw, 28px);
            border-radius: 12px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: clamp(1rem, 2vw, 1.1rem);
            letter-spacing: 1px;
            width: 100%;
            color: white;
            transition: all 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3),
                        inset 0 1px 0 rgba(255, 255, 255, 0.2);
            min-height: 52px;
        }

        .btn i {
            margin-right: 14px;           /* ← Увеличенный отступ от иконки */
            font-size: clamp(1.1rem, 2vw, 1.3rem);
            transition: transform 0.3s ease;
        }

        .btn:hover i {
            transform: scale(1.25) rotate(12deg);
        }

        .btn-listen  { background: linear-gradient(135deg, #3498db 0%, #2980b9 100%); border: 2px solid rgba(52, 152, 219, 0.4); }
        .btn-listen:hover  { background: linear-gradient(135deg, #2980b9 0%, #21618c 100%); transform: translateY(-4px) scale(1.04); }

        .btn-download { background: linear-gradient(135deg, #2ecc71 0%, #27ae60 100%); border: 2px solid rgba(46, 204, 113, 0.4); text-decoration: none; text-align: center; }
        .btn-download:hover { background: linear-gradient(135deg, #27ae60 0%, #219653 100%); transform: translateY(-4px) scale(1.04); }

        .btn-pdf { background: linear-gradient(135deg, #9b59b6 0%, #8e44ad 100%); border: 2px solid rgba(155, 89, 182, 0.4); text-decoration: none; text-align: center; }
        .btn-pdf:hover { background: linear-gradient(135deg, #8e44ad 0%, #7d3c98 100%); transform: translateY(-4px) scale(1.04); }

        /* PDF блок */
        .pdf-container {
            width: 100%;
            max-width: min(450px, 95vw);
            margin: 20px 0 40px;
        }

        .pdf-button-wrapper {
            background: rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            padding: clamp(25px, 3vw, 35px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(8px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35),
                        inset 0 1px 0 rgba(255, 255, 255, 0.1);
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            text-align: center;
        }

        .pdf-button-wrapper:hover {
            transform: translateY(-8px);
        }

        /* Аудиоплеер */
        .audio-player {
            display: none;
            position: fixed;
            bottom: -100%;
            left: 50%;
            transform: translateX(-50%);
            width: min(600px, 95vw);
            background: rgba(25, 30, 45, 0.97);
            padding: clamp(15px, 3vw, 25px);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6),
                        0 0 30px rgba(52, 152, 219, 0.3);
            z-index: 1000;
            border: 2px solid rgba(52, 152, 219, 0.35);
            backdrop-filter: blur(12px);
            transition: bottom 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .audio-player.show {
            display: block;
            bottom: clamp(15px, 3vw, 30px);
        }

        .player-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; padding-bottom: 12px; border-bottom: 2px solid rgba(52, 152, 219, 0.3); }
        .player-title { font-weight: 700; font-size: clamp(1.1rem, 2vw, 1.4rem); }
        .close-player { background: rgba(255,255,255,0.1); border: none; width: 42px; height: 42px; border-radius: 50%; color: white; font-size: 1.5rem; cursor: pointer; }
        .progress-bar { width: 100%; height: 7px; background: rgba(255,255,255,0.12); border-radius: 4px; cursor: pointer; margin: 15px 0; }
        .progress { height: 100%; background: linear-gradient(90deg, #3498db, #2ecc71); width: 0%; transition: width 0.1s linear; }
        .player-controls { display: flex; justify-content: center; gap: 25px; margin-top: 10px; }
        .player-btn { width: 62px; height: 62px; border-radius: 50%; background: linear-gradient(135deg, #3498db, #2ecc71); border: none; color: white; font-size: 1.6rem; cursor: pointer; box-shadow: 0 8px 25px rgba(0,0,0,0.4); }

        /* Анимации */
        @keyframes trackAppear {
            from { opacity: 0; transform: translateY(40px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .track {
            animation: trackAppear 0.75s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
            opacity: 0;
        }

        .track:nth-child(1) { animation-delay: 0.1s; }
        .track:nth-child(2) { animation-delay: 0.25s; }
        .track:nth-child(3) { animation-delay: 0.4s; }

        /* Уведомления */
        .notification {
            position: fixed;
            top: 25px;
            right: 25px;
            background: linear-gradient(135deg, #2ecc71, #27ae60);
            color: white;
            padding: 16px 22px;
            border-radius: 14px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.4);
            z-index: 2000;
            display: flex;
            align-items: center;
            max-width: 380px;
            transform: translateX(120%);
            transition: transform 0.45s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .notification.show { transform: translateX(0); }

        @media (max-width: 768px) {
            .tracks-container { grid-template-columns: 1fr; max-width: 460px; gap: 22px; }
            .track { padding: 18px; }
            .btn i { margin-right: 12px; }   /* чуть меньше на мобильных */
        }

        @media (prefers-reduced-motion: reduce) {
            .site-title { animation: none; }
        }
    </style>
</head>
<body>
    <h1 class="site-title">Путешествуем с математикой</h1>
   
    <div class="tracks-container">
        <!-- Трек 1 -->
        <div class="track">
            <div class="track-image">
                <img src="https://s6.iimage.su/s/05/uW6qG6txkCGh8WONt86zF4zzXpn1NoKCwF1yi4Oo.jpg"
                     srcset="https://s6.iimage.su/s/05/uW6qG6txkCGh8WONt86zF4zzXpn1NoKCwF1yi4Oo.jpg 800w"
                     sizes="(max-width: 600px) 480px, 800px"
                     alt="С Мирой по Проспекту Мира" loading="lazy">
            </div>
            <h2 class="track-name">С Мирой по Проспекту Мира</h2>
            <div class="track-buttons">
                <button class="btn btn-listen" data-track="1">
                    <i class="fas fa-play"></i> Слушать
                </button>
                <a href="https://raw.githubusercontent.com/DarkRaccoon/audio/refs/heads/master/WithMiraAlongMira.mp3"
                   class="btn btn-download" download="С Мирой по Проспекту Мира.mp3">
                    <i class="fas fa-download"></i> Скачать
                </a>
            </div>
        </div>
       
        <!-- Трек 2 -->
        <div class="track">
            <div class="track-image">
                <img src="https://s6.iimage.su/s/05/uDMdBCrxS3wnlrGb1dheh2gWS3MVHEX3CrFvz8CR.jpg"
                     srcset="https://s6.iimage.su/s/05/uDMdBCrxS3wnlrGb1dheh2gWS3MVHEX3CrFvz8CR.jpg 800w"
                     sizes="(max-width: 600px) 480px, 800px"
                     alt="Енисей-Батюшка" loading="lazy">
            </div>
            <h2 class="track-name">Енисей-Батюшка</h2>
            <div class="track-buttons">
                <button class="btn btn-listen" data-track="2">
                    <i class="fas fa-play"></i> Слушать
                </button>
                <a href="https://raw.githubusercontent.com/DarkRaccoon/audio/refs/heads/master/YeniseiFather.mp3"
                   class="btn btn-download" download="Енисей-Батюшка.mp3">
                    <i class="fas fa-download"></i> Скачать
                </a>
            </div>
        </div>
       
        <!-- Трек 3 -->
        <div class="track">
            <div class="track-image">
                <img src="https://s6.iimage.su/s/05/uotfKZlx4REnt3zJL3o0fqTYNR860rGVcojEkotz.jpg"
                     srcset="https://s6.iimage.su/s/05/uotfKZlx4REnt3zJL3o0fqTYNR860rGVcojEkotz.jpg 800w"
                     sizes="(max-width: 600px) 480px, 800px"
                     alt="Прогулка вдоль реки Кача" loading="lazy">
            </div>
            <h2 class="track-name">Прогулка вдоль реки Кача</h2>
            <div class="track-buttons">
                <button class="btn btn-listen" data-track="3">
                    <i class="fas fa-play"></i> Слушать
                </button>
                <a href="https://raw.githubusercontent.com/DarkRaccoon/audio/refs/heads/master/AWalkAlongtheKachaRiver.mp3"
                   class="btn btn-download" download="Прогулка вдоль реки Кача.mp3">
                    <i class="fas fa-download"></i> Скачать
                </a>
            </div>
        </div>
    </div>
   
    <div class="pdf-container">
        <div class="pdf-button-wrapper">
            <h2 class="pdf-title">Сборник задач по математике</h2>
           <br>
            <a href="https://raw.githubusercontent.com/DarkRaccoon/traveling-with-math/main/Collectionofmathproblems.pdf"
               class="btn btn-pdf" download="Сборник задач по математике.pdf">
                <i class="fas fa-file-pdf"></i> Скачать PDF сборник
            </a>
        </div>
    </div>

    <!-- Аудиоплеер -->
    <div class="audio-player" id="audioPlayer">
        <div class="player-header">
            <div class="player-title" id="currentTrack">Выберите трек</div>
            <button class="close-player" id="closePlayer"><i class="fas fa-times"></i></button>
        </div>
       
        <div class="progress-container">
            <div class="progress-bar" id="progressBar">
                <div class="progress" id="progress"></div>
            </div>
            <div class="time-display">
                <span id="currentTime">0:00</span>
                <span id="duration">0:00</span>
            </div>
        </div>
       
        <div class="player-controls">
            <button class="player-btn" id="prevBtn"><i class="fas fa-step-backward"></i></button>
            <button class="player-btn" id="playPauseBtn"><i class="fas fa-play" id="playIcon"></i></button>
            <button class="player-btn" id="nextBtn"><i class="fas fa-step-forward"></i></button>
        </div>
    </div>

    <script>
        const tracks = [
            { name: "С Мирой по Проспекту Мира", audioUrl: "https://raw.githubusercontent.com/DarkRaccoon/audio/refs/heads/master/WithMiraAlongMira.mp3" },
            { name: "Енисей-Батюшка", audioUrl: "https://raw.githubusercontent.com/DarkRaccoon/audio/refs/heads/master/YeniseiFather.mp3" },
            { name: "Прогулка вдоль реки Кача", audioUrl: "https://raw.githubusercontent.com/DarkRaccoon/audio/refs/heads/master/AWalkAlongtheKachaRiver.mp3" }
        ];

        const audioPlayer = document.getElementById('audioPlayer');
        const currentTrackElement = document.getElementById('currentTrack');
        const closePlayerBtn = document.getElementById('closePlayer');
        const playPauseBtn = document.getElementById('playPauseBtn');
        const playIcon = document.getElementById('playIcon');
        const progress = document.getElementById('progress');
        const progressBar = document.getElementById('progressBar');
        const currentTimeElement = document.getElementById('currentTime');
        const durationElement = document.getElementById('duration');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const listenButtons = document.querySelectorAll('.btn-listen');

        const audio = new Audio();
        let currentTrackIndex = 0;
        let isPlaying = false;

        function loadTrack(index) {
            currentTrackIndex = index;
            const track = tracks[index];
            audio.src = track.audioUrl;
            currentTrackElement.textContent = track.name;
            progress.style.width = '0%';
            currentTimeElement.textContent = '0:00';
            durationElement.textContent = '0:00';

            audioPlayer.classList.add('show');
            audio.load();

            audio.play().then(() => {
                isPlaying = true;
                playIcon.className = 'fas fa-pause';
                showNotification(`Играет: ${track.name}`);
            }).catch(() => {
                isPlaying = false;
                playIcon.className = 'fas fa-play';
            });
        }

        audio.addEventListener('timeupdate', () => {
            if (!isNaN(audio.duration) && audio.duration > 0) {
                const percent = (audio.currentTime / audio.duration) * 100;
                progress.style.width = `${percent}%`;
                currentTimeElement.textContent = formatTime(audio.currentTime);
                durationElement.textContent = formatTime(audio.duration);
            }
        });

        audio.addEventListener('loadedmetadata', () => {
            if (!isNaN(audio.duration)) durationElement.textContent = formatTime(audio.duration);
        });

        audio.addEventListener('ended', () => playNextTrack());

        function formatTime(seconds) {
            if (isNaN(seconds)) return '0:00';
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins}:${secs.toString().padStart(2, '0')}`;
        }

        progressBar.addEventListener('click', (e) => {
            const rect = progressBar.getBoundingClientRect();
            const percent = (e.clientX - rect.left) / rect.width;
            audio.currentTime = percent * audio.duration;
        });

        playPauseBtn.addEventListener('click', () => {
            if (isPlaying) {
                audio.pause();
                playIcon.className = 'fas fa-play';
            } else {
                audio.play();
                playIcon.className = 'fas fa-pause';
            }
            isPlaying = !isPlaying;
        });

        prevBtn.addEventListener('click', () => {
            currentTrackIndex = (currentTrackIndex - 1 + tracks.length) % tracks.length;
            loadTrack(currentTrackIndex);
        });

        nextBtn.addEventListener('click', () => {
            currentTrackIndex = (currentTrackIndex + 1) % tracks.length;
            loadTrack(currentTrackIndex);
        });

        function playNextTrack() {
            currentTrackIndex = (currentTrackIndex + 1) % tracks.length;
            loadTrack(currentTrackIndex);
        }

        listenButtons.forEach((btn, i) => btn.addEventListener('click', () => loadTrack(i)));

        closePlayerBtn.addEventListener('click', () => {
            audio.pause();
            isPlaying = false;
            playIcon.className = 'fas fa-play';
            audioPlayer.classList.remove('show');
        });

        function showNotification(message) {
            const notif = document.createElement('div');
            notif.className = 'notification';
            notif.innerHTML = `<i class="fas fa-music"></i><div style="flex:1"><div style="font-weight:600">${message}</div></div>`;
            document.body.appendChild(notif);
            setTimeout(() => notif.classList.add('show'), 10);
            setTimeout(() => {
                notif.classList.remove('show');
                setTimeout(() => notif.remove(), 500);
            }, 2800);
        }

        document.querySelectorAll('.btn-download, .btn-pdf').forEach(el => {
            el.addEventListener('click', () => {
                const name = el.closest('.track') ? 
                    el.closest('.track').querySelector('.track-name').textContent : 
                    'Сборника задач';
                showNotification(`Скачивание: ${name}`);
            });
        });

        document.addEventListener('DOMContentLoaded', () => {
            document.querySelectorAll('.track').forEach(t => t.style.opacity = '1');
        });
    </script>
</body>
</html>
